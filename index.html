<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Scaler — Baking Calculator</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAVQj3_3fC2KYUAE4SkxxgGF1is0JMH3QI",
    authDomain: "recipe-b9299.firebaseapp.com",
    databaseURL: "https://recipe-b9299-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "recipe-b9299",
    storageBucket: "recipe-b9299.firebasestorage.app",
    messagingSenderId: "383397986421",
    appId: "1:383397986421:web:69b14a24e96422c51ab83c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.safeStorage = {
    async set(key, val) {
      const path = key.replace(/:/g, '/');
      await set(ref(db, path), JSON.parse(val));
    },
    async listPrefix() {
      const snapshot = await get(ref(db, 'recipe'));
      return snapshot.exists() ? Object.keys(snapshot.val()).map(k => 'recipe:' + k) : [];
    },
    async get(key) {
      const path = key.replace(/:/g, '/');
      const snapshot = await get(ref(db, path));
      return snapshot.exists() ? JSON.stringify(snapshot.val()) : null;
    },
    async delete(key) {
      const path = key.replace(/:/g, '/');
      await remove(ref(db, path));
    }
  };
</script>
<style>
  :root { --paper: #F1ECE0; --paper-line: #DCD3BF; --ink: #362B22; --ink-soft: #6B5F4F; --accent: #6E7B4F; --accent-deep: #4F5A38; --gold: #C99A3B; --rose: #A6483B; --card: #FAF7EF; --mono: 'SF Mono', 'Consolas', 'Menlo', monospace; --sans: -apple-system, 'Segoe UI', Roboto, sans-serif; }
  * { box-sizing: border-box; }
  body { margin: 0; background: radial-gradient(circle at 1px 1px, var(--paper-line) 1px, transparent 1px) 0 0/22px 22px, var(--paper); color: var(--ink); font-family: Georgia, 'Times New Roman', serif; padding: 28px 14px 80px; }
  .wrap { max-width: 840px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  .eyebrow { font-family: var(--sans); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent-deep); font-weight: 700; margin-bottom: 8px; }
  h1 { font-size: 30px; margin: 0 0 6px; letter-spacing: -.01em; line-height: 1.15; }
  .sub { font-family: var(--sans); color: var(--ink-soft); font-size: 14px; max-width: 64ch; line-height: 1.55; }
  .card { background: var(--card); border: 1px solid var(--paper-line); border-radius: 4px; padding: 18px 16px; margin-bottom: 18px; box-shadow: 0 1px 0 rgba(54,43,34,0.03); }
  .card h2 { font-size: 12.5px; margin: 0 0 4px; font-family: var(--sans); text-transform: uppercase; letter-spacing: .1em; color: var(--ink-soft); font-weight: 700; }
  .card .card-note { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; line-height: 1.5; }
  textarea { width: 100%; font-family: var(--sans); font-size: 14px; padding: 10px; border: 1px solid var(--paper-line); border-radius: 3px; background: #fff; color: var(--ink); resize: vertical; min-height: 90px; }
  .btn { font-family: var(--sans); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 4px; cursor: pointer; border: 1.5px solid var(--accent); background: var(--accent); color: #fff; }
  .btn.secondary { background: #fff; color: var(--accent-deep); border-color: var(--accent); }
  .btn.danger { background: #fff; color: var(--rose); border-color: var(--rose); }
  .status-msg { font-family: var(--sans); font-size: 12.5px; margin-top: 8px; color: var(--ink-soft); }
  .saved-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 12px; background: #fff; border: 1px solid var(--paper-line); border-radius: 4px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Recipe Scaler</h1>
  </header>
  <div class="card">
    <h2>Save recipe</h2>
    <input type="text" id="recipeNameInput" placeholder="Name this recipe" style="width:100%; padding:9px;">
    <button class="btn" id="saveBtn" style="margin-top:10px;">Save this recipe</button>
    <div id="saveStatus" class="status-msg"></div>
    <div id="savedList" class="saved-list" style="margin-top:12px;"></div>
  </div>
</div>

<script>
  // ฟังก์ชันดึงข้อมูลที่แก้ไขให้เสถียรขึ้น
  async function refreshSavedListWithRetry(retries = 3) {
    const listEl = document.getElementById('savedList');
    if(!listEl) return;
    try {
      const keys = await window.safeStorage.listPrefix();
      if(keys.length === 0) { listEl.innerHTML = 'No saved recipes.'; return; }
      listEl.innerHTML = '';
      for(const key of keys){
        let rawVal = await window.safeStorage.get(key);
        if(!rawVal) continue;
        const item = document.createElement('div');
        item.className='saved-item';
        item.innerHTML = `<div>${key.split(':')[1]}</div>`;
        const delBtn = document.createElement('button');
        delBtn.className='btn danger'; delBtn.textContent='Delete';
        delBtn.onclick = async()=>{ await window.safeStorage.delete(key); refreshSavedListWithRetry(); };
        item.appendChild(delBtn);
        listEl.appendChild(item);
      }
    } catch(err) {
      if (retries > 0) setTimeout(() => refreshSavedListWithRetry(retries - 1), 1000);
      else listEl.innerHTML = '<div class="status-msg">Unable to load list.</div>';
    }
  }

  window.addEventListener('load', () => setTimeout(refreshSavedListWithRetry, 1000));

  document.getElementById('saveBtn').addEventListener('click', async ()=>{
     const name = document.getElementById('recipeNameInput').value;
     if(!name) return;
     // สมมติข้อมูลบันทึก
     await window.safeStorage.set(`recipe:${name}-${Date.now()}`, JSON.stringify({ name: name }));
     alert("Saved!");
     refreshSavedListWithRetry();
  });
</script>
</body>
</html>
