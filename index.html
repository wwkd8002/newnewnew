<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Scaler — Baking Calculator</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAVQj3_3fC2KYUAE4SkxxgGF1is0JMH3QI",
    authDomain: "recipe-b9299.firebaseapp.com",
    databaseURL: "https://recipe-b9299-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "recipe-b9299",
    storageBucket: "recipe-b9299.firebasestorage.app",
    messagingSenderId: "383397986421",
    appId: "1:383397986421:web:69b14a24e96422c51ab83c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.safeStorage = {
    async set(key, val) {
      const path = key.replace(/:/g, '/');
      await set(ref(db, path), JSON.parse(val));
    },
    async listPrefix() {
      const snapshot = await get(ref(db, 'recipe'));
      if (!snapshot.exists()) return [];
      
      const data = snapshot.val();
      const keys = [];
      
      for (let id in data) {
        keys.push('recipe:' + id);
      }
      return keys;
    },
    async get(key) {
      const path = key.replace(/:/g, '/');
      const snapshot = await get(ref(db, path));
      return snapshot.exists() ? JSON.stringify(snapshot.val()) : null;
    },
    async delete(key) {
      const path = key.replace(/:/g, '/');
      await remove(ref(db, path));
    }
  };
</script>
<style>
  :root {
    --paper: #F1ECE0;
    --paper-line: #DCD3BF;
    --ink: #362B22;
    --ink-soft: #6B5F4F;
    --accent: #6E7B4F;
    --accent-deep: #4F5A38;
    --gold: #C99A3B;
    --rose: #A6483B;
    --card: #FAF7EF;
    --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
    --sans: -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(circle at 1px 1px, var(--paper-line) 1px, transparent 1px) 0 0/22px 22px, var(--paper);
    color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    padding: 28px 14px 80px;
  }
  .wrap { max-width: 840px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  .eyebrow { font-family: var(--sans); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent-deep); font-weight: 700; margin-bottom: 8px; }
  h1 { font-size: 30px; margin: 0 0 6px; letter-spacing: -.01em; line-height: 1.15; }
  .sub { font-family: var(--sans); color: var(--ink-soft); font-size: 14px; max-width: 64ch; line-height: 1.55; }
  .card { background: var(--card); border: 1px solid var(--paper-line); border-radius: 4px; padding: 18px 16px; margin-bottom: 18px; box-shadow: 0 1px 0 rgba(54,43,34,0.03); }
  .card h2 { font-size: 12.5px; margin: 0 0 4px; font-family: var(--sans); text-transform: uppercase; letter-spacing: .1em; color: var(--ink-soft); font-weight: 700; }
  .card .card-note { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; line-height: 1.5; }
  textarea { width: 100%; font-family: var(--sans); font-size: 14px; padding: 10px; border: 1px solid var(--paper-line); border-radius: 3px; background: #fff; color: var(--ink); resize: vertical; min-height: 90px; }
  .btn { font-family: var(--sans); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 4px; cursor: pointer; border: 1.5px solid var(--accent); background: var(--accent); color: #fff; }
  .btn.secondary { background: #fff; color: var(--accent-deep); border-color: var(--accent); }
  .status-msg { font-family: var(--sans); font-size: 12.5px; margin-top: 8px; color: var(--ink-soft); }
  .status-msg.err { color: var(--rose); }
  .status-msg.ok { color: var(--accent-deep); }
  .ing-card { border: 1px solid var(--paper-line); border-radius: 4px; background: #fff; padding: 12px; margin-bottom: 10px; }
  .ing-fields { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; font-family: var(--sans); }
  .field label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); font-weight: 600; }
  .field input, .field select { font-family: var(--sans); font-size: 14px; padding: 7px 8px; border: 1px solid var(--paper-line); border-radius: 3px; }
  .field.name { flex: 2 1 160px; }
  .field.amount { flex: 1 1 80px; }
  .field.unit { flex: 1 1 90px; }
  table { width: 100%; border-collapse: collapse; font-family: var(--sans); }
  th { text-align: left; font-size: 10.5px; text-transform: uppercase; padding: 6px; border-bottom: 2px solid var(--ink); }
  td { padding: 9px 6px; border-bottom: 1px solid var(--paper-line); font-size: 14px; }
  .num { text-align: right; }
  .result { font-family: var(--mono); font-weight: 700; color: var(--accent-deep); }
</style>
</head>
<body>
<div class="wrap">
  <header><h1>Recipe Scaler</h1></header>
  <div class="card">
    <h2>Paste original recipe</h2>
    <textarea id="pasteBox" placeholder="Paste ingredients here..."></textarea>
    <div style="margin-top:10px;">
      <button class="btn" id="extractBtn">Extract automatically</button>
      <button class="btn secondary" id="clearBtn">Clear</button>
      <span id="extractStatus" class="status-msg"></span>
    </div>
  </div>
  <div class="card">
    <h2>Ingredients</h2>
    <div id="rows"></div>
  </div>
  <div class="card">
    <h2>Results</h2>
    <table>
      <thead><tr><th>Ingredient</th><th class="num">Original</th><th class="num">Scaled</th></tr></thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>
</div>

<script>
let ingredients = [];
function uid(){ return 'r'+Math.random().toString(36).slice(2,9); }

function parseAmount(str) {
  if(!str) return 0;
  const fractions = {'½':0.5, '¼':0.25, '¾':0.75, '⅓':0.33, '⅕':0.2};
  str = str.replace(/[½¼¾⅓⅕]/g, m => fractions[m]);
  return parseFloat(str) || 0;
}

document.getElementById('extractBtn').addEventListener('click', function(){
  const rawText = document.getElementById('pasteBox').value;
  const lines = rawText.split('\n');
  ingredients = [];

  lines.forEach(line => {
    if(line.trim() === '') return;
    
    // Regex จับ: [จำนวน] [หน่วย] [ชื่อ]
    // ปรับปรุง: รองรับ tsp, tbsp, cup, g, oz, ml
    const regex = /^([\d\/\.\s½¼¾⅓⅕]+)\s*(teaspoon|tsp\.?|tablespoon|tbsp\.?|cup|cups?|grams?|g|oz|ounces?|ml)?\s*(.*)$/i;
    const match = line.trim().match(regex);
    
    if(match) {
        ingredients.push({
            id: uid(),
            amount: parseAmount(match[1].trim()),
            unit: match[2] ? match[2].toLowerCase().replace('teaspoon', 'tsp').replace('tablespoon', 'tbsp') : 'g',
            name: match[3] ? match[3].trim() : 'Ingredient'
        });
    }
  });
  renderRows();
});

function renderRows() {
  const container = document.getElementById('rows');
  container.innerHTML = '';
  ingredients.forEach(row => {
    const div = document.createElement('div');
    div.className = 'ing-card';
    div.innerHTML = `${row.amount} ${row.unit} ${row.name}`;
    container.appendChild(div);
  });
  renderResults();
}

function renderResults() {
  const body = document.getElementById('resultsBody');
  body.innerHTML = '';
  ingredients.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.name}</td><td class="num">${row.amount} ${row.unit}</td><td class="num result">${row.amount} ${row.unit}</td>`;
    body.appendChild(tr);
  });
}

document.getElementById('clearBtn').onclick = () => { ingredients=[]; renderRows(); document.getElementById('pasteBox').value=''; };
</script>
</body>
</html>
